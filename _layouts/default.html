<button onclick="toggleTheme()" class="theme-btn">🌙 Toggle</button>

<style>
.theme-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px;
  border-radius: 50%;
  background: red;
  color: white;
  border: none;
}
</style>

<script>
function toggleTheme(){
  document.body.classList.toggle("light-mode");
}
</script>

<style>
.light-mode {
  background: #ffffff;
  color: #000;
}
</style>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <meta name="description" content="{{ page.description | default: site.description }}">
</head>
<body>
  <header>
    <nav class="nav-bar">
      <a href="/" class="logo">{{ site.title }}</a>
      <div class="nav-links">
        <a href="/about/">About</a>
        <a href="/journey/">Journey</a>
        <a href="/contact/">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} Salman Zahoor | All Rights Reserved</p>
  </footer>
</body>
</html>
