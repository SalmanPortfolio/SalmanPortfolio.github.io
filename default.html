<button onclick="toggleTheme()" class="theme-btn">🌙 Toggle</button>

<style>
.theme-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px;
  border-radius: 50%;
  background: red;
  color: white;
  border: none;
}
</style>

<script>
function toggleTheme(){
  document.body.classList.toggle("light-mode");
}
</script>

<style>
.light-mode {
  background: #ffffff;
  color: #000;
}
</style>
