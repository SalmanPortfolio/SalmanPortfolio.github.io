<script>
  // Fade in welcome text
  document.addEventListener("DOMContentLoaded", function() {
    const el = document.getElementById('welcome');
    el.style.opacity = 0;
    let op = 0;
    const fadeIn = setInterval(function() {
      if(op >= 1){ clearInterval(fadeIn); }
      el.style.opacity = op;
      op += 0.02;
    }, 20);
  });
</script>
