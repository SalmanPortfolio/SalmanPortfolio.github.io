<style>
.btn {
  padding:14px 30px;
  color:white;
  text-decoration:none;
  border-radius:8px;
  margin:7px;
  font-weight:bold;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  transition:0.3s;
}
.btn-green{background:#1abc9c;}
.btn-green:hover{background:#16a085; transform: scale(1.05);}
.btn-blue{background:#3498db;}
.btn-blue:hover{background:#2980b9; transform: scale(1.05);}
.btn-red{background:#e74c3c;}
.btn-red:hover{background:#c0392b; transform: scale(1.05);}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const el = document.getElementById('welcome-text');
  el.style.opacity = 0;
  let op = 0;
  const fadeIn = setInterval(function() {
    if(op>=1){ clearInterval(fadeIn); }
    el.style.opacity = op;
    op += 0.02;
  }, 20);
});
</script>
